name: zili_coffee
description: A sales management application supporting revenue analytics, multi-channel order management (Website, Facebook, Shopee), customer management, product quotation, inventory management, and production warehouse operations.

publish_to: "none"

version: 1.3.4+1

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  # ================= CORE =================
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  equatable: ^2.0.5
  intl: ^0.20.2
  rxdart: ^0.27.7
  get_it: ^7.6.0

  # ========== STATE & ROUTING ==========
  flutter_bloc: ^8.1.3
  go_router: ^17.0.0

  # ========== NETWORK & CONFIG ==========
  dio: ^5.0.0
  flutter_dotenv: ^6.0.0
  dart_ipify: ^1.1.1

  # ========== FIREBASE ==========
  firebase_core: ^4.3.0
  firebase_crashlytics: ^5.0.6
  firebase_messaging: ^16.1.0
  flutter_local_notifications: ^19.5.0

  # ========== AUTH ==========
  google_sign_in: ^5.0.3
  # flutter_facebook_auth: ^6.0.1

  # ========== DEVICE & STORAGE ==========
  device_info_plus: ^12.3.0
  package_info_plus: ^8.1.0
  path_provider: ^2.1.0
  shared_preferences: ^2.1.2
  url_launcher: ^6.1.14
  webview_flutter: ^4.2.3

  # ========== MEDIA / SCAN ==========
  image_picker: ^1.2.1
  media_picker_widget: ^1.0.7
  qr_flutter: ^4.1.0
  photo_view: ^0.14.0
  share_plus: ^12.0.1
  open_filex: ^4.7.0
  external_path: ^2.2.0
  file_saver: ^0.3.1
  file_picker: ^10.3.10

  # ========== UI & ANIMATION ==========
  cached_network_image: ^3.4.1
  carousel_slider: ^5.1.1
  dotted_border: ^2.1.0
  flutter_screenutil: ^5.7.0
  flutter_svg: ^2.0.6
  flutter_widget_from_html: ^0.10.4
  loading_animation_widget: ^1.3.0
  lottie: ^3.3.2
  shimmer: ^3.0.0
  syncfusion_flutter_charts: ^31.2.15

  # ========== UX HELPERS ==========
  easy_debounce: ^2.0.3
  html_editor_enhanced: ^2.7.1
  flutter_html: ^3.0.0

  # ========== ICONS ==========
  cupertino_icons: ^1.0.2
  logger: ^2.6.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mockito: ^5.4.2 # Thư viện tạo mock data. Link: "https://pub.dev/packages/mockito"
  flutter_native_splash: ^2.3.1
  icons_launcher: ^3.0.3

dependency_overrides:
  photo_manager: ^3.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/icons/
    - assets/images/
    - assets/logos/
    - .env

  fonts:
    - family: Passions Conflict
      fonts:
        - asset: assets/fonts/passions_conflict.ttf
    - family: SVNGilroy Bold
      fonts:
        - asset: assets/fonts/bold.otf
    - family: SVNGilroy SemiBold
      fonts:
        - asset: assets/fonts/semibold.otf
    - family: SVNGilroy Medium
      fonts:
        - asset: assets/fonts/medium.otf
    - family: SVNGilroy Medium Italic
      fonts:
        - asset: assets/fonts/medium_italic.otf
