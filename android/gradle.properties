# ===============================
# Gradle JVM
# ===============================
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8

# Tắt Gradle daemon (ổn định hơn trên Windows)
org.gradle.daemon=false

# ===============================
# Kotlin (QUAN TRỌNG NHẤT)
# ===============================
# Tắt incremental compiler
kotlin.incremental=false

# Ép Kotlin chạy trong process (không dùng daemon)
kotlin.compiler.execution.strategy=in-process

# ===============================
# Android
# ===============================
android.useAndroidX=true
