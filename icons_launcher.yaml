icons_launcher:
  image_path: "assets/android/ic_launcher.png"
  platforms:
    android:
      enable: true
      adaptive_background_image: "assets/android/adaptive_icon_background.png"
      adaptive_foreground_image: "assets/android/ic_launcher.png"
      adaptive_round_image: "assets/android/ic_launcher.png"
      adaptive_monochrome_image: "assets/android/ic_launcher.png"
    ios:
      enable: true


# cmd: dart run icons_launcher:create --path <file name>
# run: dart run icons_launcher:create --path icons_launcher.yaml